<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📷 图片上传</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f0f2f5;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 16px}
h1{font-size:1.5rem;color:#1a1a1a;margin-bottom:6px}
.sub{font-size:.85rem;color:#65676b;margin-bottom:28px}
.drop-zone{width:100%;max-width:560px;border:2px dashed #bdc3d4;border-radius:16px;padding:56px 24px;text-align:center;cursor:pointer;transition:.2s;background:#fff;margin-bottom:16px;position:relative}
.drop-zone:hover,.drop-zone.drag{background:#f7f9ff;border-color:#4263eb;box-shadow:0 0 0 3px rgba(66,99,235,.1)}
.drop-icon{font-size:3rem;margin-bottom:14px}
.drop-zone p{color:#4a5568;font-size:.95rem}
.drop-zone .sub2{font-size:.8rem;color:#a0aec0;margin-top:4px}
.drop-zone input{display:none}
.grid{display:flex;flex-wrap:wrap;gap:10px;width:100%;max-width:560px;margin-bottom:16px}
.thumb{position:relative;width:108px;height:108px;border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08);background:#e8eaed;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.thumb img{width:100%;height:100%;object-fit:cover;display:block}
.thumb .del{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:50%;width:22px;height:22px;cursor:pointer;font-size:14px;line-height:22px;text-align:center;display:none}
.thumb:hover .del{display:block}
.thumb .name{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.45);color:#fff;font-size:.62rem;padding:2px 5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.result{width:100%;max-width:560px;background:#fff;border:1px solid #e1e4e8;border-radius:12px;padding:16px 20px;margin-bottom:12px}
.result-label{font-size:.75rem;color:#8b949e;margin-bottom:6px}
.result-row{display:flex;gap:10px;align-items:center}
.result input{flex:1;border:none;outline:none;font-size:.82rem;font-family:"SF Mono",Monaco,monospace;background:transparent;color:#24292f}
.result button{background:#f6f8fa;border:1px solid #d0d7de;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:.82rem;color:#24292f;white-space:nowrap;transition:.15s}
.result button:hover{background:#f3f4f6;border-color:#d0d7de}
.log{width:100%;max-width:560px;background:#161b22;color:#e6edf3;border:1px solid #30363d;border-radius:10px;padding:14px;font-size:.78rem;max-height:160px;overflow-y:auto;font-family:"SF Mono",Monaco,monospace;white-space:pre-wrap;word-break:break-all;margin-bottom:12px;display:none}
.footer{color:#8b949e;font-size:.75rem;margin-top:20px;text-align:center}
.footer a{color:#4263eb;text-decoration:none}
</style>
</head>
<body>
<h1>📷 图片上传</h1>
<p class="sub">GitHub 存储 · Cloudflare 全球加速 · 永久免费</p>

<div class="drop-zone" id="drop">
  <div class="drop-icon">📤</div>
  <p>点击或拖拽图片到这里</p>
  <p class="sub2">支持 jpg, png, gif, webp · 最大 5MB</p>
  <input type="file" id="fileInput" multiple accept="image/*">
</div>

<div class="grid" id="grid"></div>

<div class="result" id="resultBox" style="display:none">
  <div class="result-label">📎 图片链接（点击复制）</div>
  <div class="result-row">
    <input type="text" id="resultUrl" readonly>
    <button id="copyBtn">复制</button>
  </div>
</div>

<div class="log" id="logBox"></div>

<div class="footer">
  存储于 GitHub · <a href="https://cdn.jsdelivr.net/gh/tupaopao/img-host/uploads/" target="_blank">查看全部图片</a>
</div>

<script>
// ====== CONFIG ======
const WORKER_URL = "https://img-upload.szbb2026.workers.dev";
// Upload CDN base (jsDelivr auto-refreshes)
const CDN = "https://cdn.jsdelivr.net/gh/tupaopao/img-host/uploads/";

// ====== DOM ======
const drop = document.getElementById("drop");
const fileInput = document.getElementById("fileInput");
const grid = document.getElementById("grid");
const resultBox = document.getElementById("resultBox");
const resultUrl = document.getElementById("resultUrl");
const copyBtn = document.getElementById("copyBtn");
const logBox = document.getElementById("logBox");

let files = [];
let uploaded = [];

function log(msg) {
  logBox.style.display = "block";
  logBox.textContent = (logBox.textContent ? logBox.textContent + "\n" : "") + msg;
  logBox.scrollTop = logBox.scrollHeight;
}

function showResult(url) {
  resultUrl.value = url;
  resultBox.style.display = "block";
}

// ====== DRAG & DROP ======
drop.addEventListener("click", () => fileInput.click());
drop.addEventListener("dragover", e => { e.preventDefault(); drop.classList.add("drag"); });
drop.addEventListener("dragleave", () => drop.classList.remove("drag"));
drop.addEventListener("drop", e => { e.preventDefault(); drop.classList.remove("drag"); addFiles(Array.from(e.dataTransfer.files)); });
fileInput.addEventListener("change", () => addFiles(Array.from(fileInput.files)));

function addFiles(list) {
  const valid = list.filter(f => f.size <= 5 * 1024 * 1024 && f.type.startsWith("image/"));
  if (valid.length < list.length) alert("部分文件不是图片或超过 5MB，已跳过");
  files = files.concat(valid);
  render();
}

function render() {
  grid.innerHTML = "";
  files.forEach((f, i) => {
    const div = document.createElement("div");
    div.className = "thumb";
    const img = document.createElement("img");
    img.src = URL.createObjectURL(f);
    img.onload = () => URL.revokeObjectURL(img.src);
    const del = document.createElement("button");
    del.className = "del";
    del.textContent = "×";
    del.onclick = e => { e.stopPropagation(); files.splice(i, 1); render(); };
    const name = document.createElement("div");
    name.className = "name";
    name.textContent = f.name;
    div.append(img, del, name);
    grid.appendChild(div);
  });
}

// ====== UPLOAD ======
async function uploadAll() {
  if (!files.length) return;
  log(`⬆ 开始上传 ${files.length} 张图…`);

  for (const f of files) {
    try {
      const base64 = await new Promise((res, rej) => {
        const reader = new FileReader();
        reader.onload = () => res(reader.result.split(",")[1]);
        reader.onerror = rej;
        reader.readAsDataURL(f);
      });

      const ext = f.name.split(".").pop() || "jpg";
      const ts = Date.now();
      const rand = Math.random().toString(36).substr(2, 5);
      const safeName = f.name.replace(/[^a-zA-Z0-9._-]/g, "_");
      const filename = `${ts}_${rand}_${safeName}`;

      log(`  上传中: ${f.name}`);
      const resp = await fetch(`${WORKER_URL}/upload`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ filename, base64 })
      });

      const data = await resp.json();
      if (!data.success) throw new Error(data.error || "上传失败");

      const cdnUrl = CDN + filename;
      log(`  ✅ ${cdnUrl}`);
      uploaded.push(cdnUrl);
    } catch (e) {
      log(`  ❌ ${f.name}: ${e.message}`);
    }
  }

  if (uploaded.length) {
    showResult(uploaded[uploaded.length - 1]);
    log(`\n✅ 完成！共上传 ${uploaded.length} 张图`);
    files = [];
    render();
  }
}

// ====== COPY ======
resultUrl.addEventListener("click", () => {
  resultUrl.select();
});
copyBtn.addEventListener("click", () => {
  navigator.clipboard.writeText(resultUrl.value).then(() => {
    copyBtn.textContent = "已复制!";
    setTimeout(() => copyBtn.textContent = "复制", 1800);
  });
});

// ====== AUTO UPLOAD ON DROP ======
drop.addEventListener("drop", () => {
  setTimeout(uploadAll, 100);
});
fileInput.addEventListener("change", () => {
  setTimeout(uploadAll, 100);
});
</script>
</body>
</html>
